<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form practise</title>
</head>
<body>
    <h1 align="center">Registration form</h1>

    <form>
        <div>
            <label for="fullname">Full Name:</label>
            <input type="text" name="fullname" id="fullname">
        </div><br>

        <div>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email">
        </div><br>

        <div>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password">
        </div><br>

        <div>
            <label for="DOB">Date of Birth:</label>
            <input type="date" name="DOB" id="DOB">
        </div><br>

        <div>
            <label for="photo">Choose your photo:</label>
            <input type="file" name="photo" id=photo>
        </div><br>
         
        <div>
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" id="male">Male
            <input type="radio" name="gender" id="female">Female
        </div><br>

        <div>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       
            <label for="religion">Religion:</label>
            <input type="checkbox" name="religion" id="muslim">Muslim
            <input type="checkbox" name="religion" id="musulman">Musulman
        </div><br>
        
        <div>
           <label for="department">Department:</label>
          <select> Department
             <option selected>Selection</option>
              <option value="cse">CSE</option>
              <option value="eee">EEE</option>
              <option value="llb">LLB</option>
             
            </select>
        </div><br>

        <div>
            <label for="massege">Message:</label><br>
            <textarea cols="20" rows="10"></textarea>
            
        </div><br>

        <div>
            <input type="submit" value="Resister">
            <input type="reset" value="Clear">

        </div>

      
    </form>
    
</body>
</html>
