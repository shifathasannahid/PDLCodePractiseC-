<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html table</title>
   <!--Styling(CSS) er kaj kora hoyece-->

   <style>
   table{
    width: 300px;
    height: 200px;
    border: 2px solid greenyellow;
    /*Cellspacing*/
    border-collapse: collapse;
   }

   td,th{
    border: 2px solid greenyellow;
    text-align: center;
     /*Cellspading*/
    padding: 15px;
   }

   </style> 

  </head>

<body>
  <table >
    <caption><b>Student Details</b></caption>
         <thead >
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>CGPA</th>
          </tr>
         </thead>

         <tbody>
            <tr>
                <td>101</td>
                <td>Shifat</td>
                <td>3.93</td>
            </tr>

            <tr> 
              <td>102</td>
              <td>Nahid</td>
              <td>3.77</td>
            </tr>

            <tr> 
              <td>103</td>
              <td>Ibrahim</td>
              <td>3.77</td>
            </tr>

         </tbody>
    </table>  
</body>
</html>
