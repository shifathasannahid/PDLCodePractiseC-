<!DOCTYPE html>
<html lang="en">
<head>
<title>Accessible Table</title>

</head>
<body>
    <header>
       <h1>HTML Table</h1> 
    </header>
</body>
<main>
    <table>
        <caption>
            student info

        </caption>
        <col span="3" style="background-color: burlywood;" />
        <colgroup>
        </colgroup>
        <thead>
            <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">GPA</th>
            </tr>

        </thead>
        <tbody>
            <tr>
                <td scope="row">101</td>
                <td>Shifat</td>
                <td>3.67</td>
            </tr>

            <tr>
                <td scope="row">102</td>
                <td>Hasan</td>
                <td>3.97</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Nahid</td>
                <td>3.57</td>
            </tr>

        </tbody>

    </table>
</main>




</html>
