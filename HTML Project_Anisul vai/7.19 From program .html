<!DOCTYPE html>
<html lang="en">
<head>
    <title>
        form
    </title>
</head>

<body>
    <h2>
        Resistation Form
    </h2>
<form>
    <div>
   <label for="fullname"> FullName:</label>  
   <input type="text" name="fullname" id="fullname" required>
    </div> <br>

    <div>
        <label for="email"> Email:</label>  
        <input type="email" name="email" id="email">
    </div> <br>

    <div>
        <label for="password"> Password:</label>  
        <input type="password" name="password" id="password">
     </div> <br>

     <div>
        <label for="DOB"> Date of Birth:</label>  
        <input type="date" name="DOB" id="DOB">
     </div> <br>

     <div>
        <label for="photo"> Choose your photo:</label>  
        <input type="file" name="photo" id="photo">
     </div> <br>

     <div>
        <label for="gender">Gender: </label>  
        <input type="radio" name="gender" id="gender" value="male">Male
        <input type="radio" name="gender" id="gender" value="female">Female
 
    </div> <br>

    <div>
        <label for="religion">Religion: </label>  
        <input type="checkbox" name="religion" id="Muslim" value="Muslim">Islam
        <input type="checkbox" name="religion" id="Musrik" value="Musrik">Musrik(Hindu)
 
    </div> <br>

    <div>
        <label for="department">Department: </label>  
       <select name="department">
        <option selected>Selection</option>
        <option value="cse">CSE</option>
        <option value="eee">EEE</option>
        <option value="bba">BBA</option>


     </select>
    </div>
    
    <div>
        <label for="massege">Massege: </label> <br>
        <textarea cols="20" rows="10"> </textarea> 
    </div>

    <div>
        <input type="submit" value="Resister">
        <input type="reset" value="Clear">

    </div>


     

</form>




</body>



</html>
