<!DOCTYPE html>
<html lang="en">
      <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Table er part Colspan and Rowspan</title>
 
      <style>
        table{
            border: 2px solid blue;
            height: 200px;
            width: 300px;
            border-collapse: collapse;

        }

        th,td{
            border: 2px solid blue;

        }
    

      </style>
    </head>

           <body>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th colspan="2">Phone</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>101</td>
                        <td>Shifat</td>
                        <td>013</td>
                        <td  rowspan="2">019</td>
                    </tr>

                    <tr>
                        <td>102</td>
                        <td>Hasan</td>
                        <td>016</td>
                        
                    </tr>

                    <tr>
                        <td>103</td>
                        <td>Nahid</td>
                        <td>018</td>
                        <td>017</td>
                    </tr>

                </tbody>
            </table>
    
           </body>
           
</html>
